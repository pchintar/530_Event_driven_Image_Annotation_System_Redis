name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest numpy faiss-cpu redis
    
    - name: Start services
      run: |
        python3 processor_service.py &
        python3 storage_service.py &
        python3 embedding_service.py &
        python3 search_service.py &
        sleep 5
    
    - name: Run comprehensive integration test
      run: |
        python3 test_integration.py
    
    - name: Run unit tests
      run: |
        pytest test_system.py -v
